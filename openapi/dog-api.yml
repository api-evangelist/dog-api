openapi: 3.1.0
info:
  title: Dog API
  description: The Dog API (dog.ceo) is the internet's largest collection of open-source dog pictures, exposing over 20,000 dog images accessible by more than 120 breeds. The API is free, requires no authentication,
    and returns JSON. An optional `alt` variant returns image URLs paired with descriptive alt text for accessibility. The canonical implementation is the open-source PHP Symfony project at github.com/ElliottLandsborough/dog-ceo-api,
    licensed MIT.
  version: 1.1.0
  contact:
    name: Dog API
    url: https://dog.ceo/dog-api/
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  x-generated-from: documentation+source
  x-source-url: https://github.com/ElliottLandsborough/dog-ceo-api/blob/main/src/Controller/MainController.php
  x-last-validated: '2026-05-30'
servers:
- url: https://dog.ceo/api
  description: Dog API production server
tags:
- name: Breeds
  description: List and look up master breeds and their sub-breeds.
- name: Images
  description: Fetch random or breed-specific dog images (with optional alt text).
- name: Info
  description: Look up free-text breed information where available.
paths:
  /breeds/list/all:
    get:
      tags:
      - Breeds
      summary: Dog API List All Breeds
      description: Returns the complete master breed list with each breed's sub-breeds (if any).
      operationId: listAllBreeds
      responses:
        '200':
          description: Successful response with master breed list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BreedListResponse'
              examples:
                ListAllBreeds200Example:
                  summary: Default listAllBreeds 200 response
                  x-microcks-default: true
                  value:
                    message:
                      hound:
                      - afghan
                      - basset
                      - blood
                      - english
                      retriever:
                      - chesapeake
                      - curly
                      - flatcoated
                      - golden
                      spaniel:
                      - blenheim
                      - brittany
                      - cocker
                      - irish
                    status: success
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /breeds/list/all/random:
    get:
      tags:
